# Шаблон для /etc/nginx/sites-available/agency-site
# Замените example.ru и путь к сертификатам.
#
# sudo ln -s /etc/nginx/sites-available/agency-site /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

upstream agency_site {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.ru www.example.ru;

    # Certbot / reg.ru SSL — после получения сертификата раскомментируйте редирект:
    # return 301 https://$host$request_uri;

    client_max_body_size 110M;

    location / {
        proxy_pass http://agency_site;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Статика Next.js (_next/static) — можно кэшировать агрессивно
    location /_next/static/ {
        proxy_pass http://agency_site;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

