# Netlify deploy config for agency-site (Next.js 16 + Prisma + Neon)
# Docs: docs/netlify-deploy.md
#
# Do NOT set `publish` here or in the Netlify UI (.next / out break SSR).
# @netlify/plugin-nextjs (OpenNext) provisions functions + static assets.

[build]
  command = "npm run build:netlify"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Prisma query engine must ship with serverless functions
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@prisma/client"]
  included_files = ["node_modules/.prisma/**", "node_modules/@prisma/client/**"]

# Upload routes: Next.js maxDuration export is respected by OpenNext where supported.
# Netlify sync functions cap at 60s; request body is limited to ~6 MB (see docs).
